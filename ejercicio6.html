<body>
    <script>
        const nombres = [
            "ana garcia",
            "luis perez",
            "marta lopez",
            "carlos ruiz"
        ];
        const formateados = nombres.map(n => {
            const [nombre, apellido] = n.split(" ")
            return `${apellido.toUpperCase()}, ${nombre}`
        })
        console.log(formateados)
    </script>
</body>
